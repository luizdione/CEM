name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installers:
    name: Installer (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: Linux, target: package:linux }
          - { os: windows-latest, name: Windows, target: package:win }
          - { os: macos-latest, name: macOS, target: package:mac }
    runs-on: ${{ matrix.os }}
    env:
      # Build unsigned artifacts; signing secrets can be added later.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Build installer
        run: pnpm --filter @cem/desktop ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cem-${{ matrix.name }}
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Include electron-updater feed metadata (latest*.yml, *.blockmap) so
          # the in-app updater can detect and download new versions.
          files: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: false
          generate_release_notes: true

  publish-cli:
    name: Package CLI tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:cli
      - name: Pack CLI
        run: pnpm --filter @cem/cli exec npm pack --pack-destination ../..
      - name: Attach CLI tarball to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: cem-cli-*.tgz
          fail_on_unmatched_files: false
