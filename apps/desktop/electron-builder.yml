appId: com.luizdione.cem
productName: Claude Environment Manager
copyright: Copyright © 2025 Luiz Dione and CEM Contributors

directories:
  output: release
  buildResources: build

files:
  - out/**
  - '!**/*.map'

extraMetadata:
  main: out/main/index.js

# Update feed. electron-updater reads the release assets published by the
# Release workflow to offer in-app updates.
publish:
  provider: github
  owner: luizdione
  repo: CEM

# Associate the .cem file type with the app on every platform.
fileAssociations:
  - ext: cem
    name: CEM Archive
    description: Claude Environment Manager Archive
    role: Editor

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: Luiz Dione <luiz.dione.melo@gmail.com>
  synopsis: Backup, restore and migrate Claude Code environments

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
